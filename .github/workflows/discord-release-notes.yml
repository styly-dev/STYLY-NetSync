name: Post release notes to Discord

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to post. Posts the latest release when empty.
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Post release notes
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;

            if (!webhookUrl) {
              core.setFailed('DISCORD_WEBHOOK_URL secret is not set.');
              return;
            }

            let release = context.payload.release;

            if (!release) {
              const tag = core.getInput('tag');

              if (tag) {
                const response = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                release = response.data;
              } else {
                const response = await github.rest.repos.getLatestRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
                release = response.data;
              }
            }

            const releaseBody = release.body?.trim() || 'No release notes provided.';
            const maxDescriptionLength = 3900;
            const description =
              releaseBody.length > maxDescriptionLength
                ? `${releaseBody.slice(0, maxDescriptionLength - 20)}\n\n...continued on GitHub`
                : releaseBody;

            const payload = {
              username: 'GitHub Releases',
              embeds: [
                {
                  title: `${context.repo.repo} ${release.tag_name}`,
                  url: release.html_url,
                  description,
                  color: 0x2f81f7,
                  fields: [
                    {
                      name: 'Release',
                      value: `[${release.name || release.tag_name}](${release.html_url})`,
                      inline: true,
                    },
                    {
                      name: 'Author',
                      value: release.author?.login || context.actor,
                      inline: true,
                    },
                  ],
                  timestamp: release.published_at || new Date().toISOString(),
                },
              ],
            };

            const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              const body = await response.text();
              core.setFailed(`Discord webhook failed: ${response.status} ${body}`);
            }
